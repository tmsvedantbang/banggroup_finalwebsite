backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "ir_sections"
    label: "Investor Relations"
    files:
      - label: "Annual Reports"
        name: "annual-reports"
        file: "_data/ir/annual-reports.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string", hint: "Paste URL or upload PDF via Media"}
              - {label: "Date / Year", name: "date", widget: "string"}

      - label: "Financial Results"
        name: "financial-results"
        file: "_data/ir/financial-results.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

      - label: "Shareholding Pattern"
        name: "shareholding"
        file: "_data/ir/shareholding.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

      - label: "Board Meeting Notices & Outcomes"
        name: "board-meetings"
        file: "_data/ir/board-meetings.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

      - label: "Annual Secretarial Compliance"
        name: "secretarial"
        file: "_data/ir/secretarial.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

      - label: "Policies"
        name: "policies"
        file: "_data/ir/policies.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

      - label: "Related Party Transactions"
        name: "rpt"
        file: "_data/ir/rpt.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

      - label: "Subsidiary Financials"
        name: "subsidiaries"
        file: "_data/ir/subsidiaries.json"
        fields:
          - {label: "Section Title", name: "title", widget: "string"}
          - label: "Documents"
            name: "documents"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "PDF URL", name: "pdf_url", widget: "string"}
              - {label: "Date", name: "date", widget: "string"}

  - name: "pages"
    label: "Main Pages"
    files:
      - label: "About Group"
        name: "about"
        file: "_data/about.json"
        fields:
          - {label: "Content", name: "content", widget: "markdown"}

      - label: "Contact Us"
        name: "contact"
        file: "_data/contact.json"
        fields:
          - {label: "Contact Person", name: "person", widget: "string"}
          - {label: "Address", name: "address", widget: "text"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}

  - name: "brands"
    label: "Brand Pages"
    files:
      - label: "Bang & Scott"
        name: "bang-scott"
        file: "_data/brands/bang-scott.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro", name: "intro", widget: "text"}
          - {label: "Content", name: "content", widget: "markdown"}
          - {label: "Catalogue PDF URL", name: "catalogue_pdf", widget: "string", required: false}

      - label: "Thomas Scott"
        name: "thomas-scott"
        file: "_data/brands/thomas-scott.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro", name: "intro", widget: "text"}
          - {label: "Content", name: "content", widget: "markdown"}
          - {label: "Catalogue PDF URL", name: "catalogue_pdf", widget: "string", required: false}

      - label: "Bang Europa"
        name: "bang-europa"
        file: "_data/brands/bang-europa.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro", name: "intro", widget: "text"}
          - {label: "Content", name: "content", widget: "markdown"}
          - {label: "Catalogue PDF URL", name: "catalogue_pdf", widget: "string", required: false}

      - label: "Italian Gold"
        name: "italian-gold"
        file: "_data/brands/italian-gold.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro", name: "intro", widget: "text"}
          - {label: "Content", name: "content", widget: "markdown"}
          - {label: "Catalogue PDF URL", name: "catalogue_pdf", widget: "string", required: false}

      - label: "Hammersmith"
        name: "hammer-smith"
        file: "_data/brands/hammer-smith.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Intro", name: "intro", widget: "text"}
          - {label: "Content", name: "content", widget: "markdown"}
          - {label: "Catalogue PDF URL", name: "catalogue_pdf", widget: "string", required: false}

  - name: "news"
    label: "News & Events"
    label_singular: "News Item"
    folder: "_data/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "date"}
      - {label: "Content", name: "body", widget: "markdown"}
      - {label: "PDF Attachment URL", name: "pdf_url", widget: "string", required: false, hint: "Optional PDF — opens in new tab"}
